<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Gaming Sync v3.5</title>
    <style>
        :root { --bg: #050505; --card-bg: #0a0a0c; --accent: #00f2ff; --danger: #ff3344; --success: #00ff88; --text: #e0e0e0; --border: #1a1a1f; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--accent); margin: 0; }
        #syncStatus { font-size: 0.75rem; font-weight: bold; margin-top: 5px; display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; background: var(--card-bg); text-align: center; position: relative; cursor: pointer; transition: 0.2s; }
        .card.active { border-color: var(--accent); background: #0d0d10; }
        .timer { font-size: 2.2rem; font-weight: 900; margin: 10px 0; font-family: monospace; }
        .cust-name { color: var(--accent); font-size: 0.85rem; font-weight: bold; display: block; min-height: 1.2em; text-transform: uppercase; }
        .btn-prime { background: var(--accent); color: #000; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; border: none; margin-top: 10px; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; border-radius: 8px; font-size: 1rem; }
    </style>
</head>
<body onload="init()">

    <div class="header">
        <div>
            <h1 class="logo">ANNA GAMING</h1>
            <span id="syncStatus">● CONNECTING...</span>
        </div>
        <div style="text-align:right">
            <div style="font-size:0.7rem; color:#666; letter-spacing: 1px;">TOTAL REVENUE</div>
            <div style="font-weight:bold; color:var(--success); font-size: 1.2rem;">₹<span id="rev">0</span></div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 id="mTitle" style="margin-top:0; color:var(--accent);">START SESSION</h2>
            <label style="font-size:0.7rem; color:#666;">CUSTOMER NAME</label>
            <input type="text" id="mName" placeholder="Enter Name">
            <label style="font-size:0.7rem; color:#666;">MINUTES</label>
            <input type="number" id="mMins" value="60">
            <button class="btn-prime" onclick="startSession()">START UNIT</button>
            <button onclick="closeModal()" style="background:none; color:#555; border:none; width:100%; margin-top:15px; cursor:pointer;">CANCEL</button>
        </div>
    </div>

    <script>
        const SYNC_URL = "https://script.google.com/macros/s/AKfycbzDiQaJQbmSao61nV9Pr--buI3ZDd_84vIAB665hFRL7c3LuYCKwmpT9W8IIespAK9fhw/exec"; 
        const currentDayKey = new Date().toLocaleDateString('en-CA');
        let appData = { active: {}, revenue: 0 };
        let selectedId = null;

        async function init() {
            await pull();
            render();
            setInterval(tick, 1000);
            setInterval(pull, 5000); 
        }

        async function pull() {
            try {
                const res = await fetch(`${SYNC_URL}?key=anna_${currentDayKey}`);
                const data = await res.json();
                if (data.active !== undefined) {
                    appData = data;
                    render();
                    const status = document.getElementById('syncStatus');
                    status.innerText = "● ONLINE (SYNCED)";
                    status.style.color = "var(--success)";
                }
            } catch (e) { 
                document.getElementById('syncStatus').innerText = "● OFFLINE (RETRYING...)";
                document.getElementById('syncStatus').style.color = "var(--danger)";
            }
        }

        async function push() {
            const status = document.getElementById('syncStatus');
            status.innerText = "● SAVING...";
            status.style.color = "var(--accent)";
            const content = encodeURIComponent(JSON.stringify(appData));
            try {
                await fetch(`${SYNC_URL}?key=anna_${currentDayKey}&content=${content}`);
                status.innerText = "● ONLINE (SYNCED)";
                status.style.color = "var(--success)";
            } catch (e) {
                status.innerText = "● SYNC ERROR";
            }
        }

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = "";
            for (let i = 1; i <= 6; i++) {
                const s = appData.active[i];
                container.innerHTML += `
                    <div class="card ${s ? 'active' : ''}" onclick="handleClick(${i})">
                        <div style="font-size:0.7rem; color:#444; font-weight:bold;">UNIT 0${i}</div>
                        <div class="timer" id="t-${i}">00:00</div>
                        <span class="cust-name">${s ? s.name : 'AVAILABLE'}</span>
                        <button class="btn-prime" style="font-size:0.7rem; padding:8px; background:${s ? 'var(--danger)' : 'var(--accent)'}; color:${s ? '#fff' : '#000'}">
                            ${s ? 'END SESSION' : 'OPEN UNIT'}
                        </button>
                    </div>`;
            }
            document.getElementById('rev').innerText = appData.revenue;
        }

        function handleClick(id) {
            selectedId = id;
            if (appData.active[id]) checkout();
            else document.getElementById('modal').style.display = 'flex';
        }

        async function startSession() {
            const name = document.getElementById('mName').value.trim();
            const mins = document.getElementById('mMins').value;
            if (!name) return alert("Please enter a name");
            appData.active[selectedId] = { name, end: Date.now() + (mins * 60000) };
            closeModal(); render(); await push();
        }

        async function checkout() {
            if (confirm("End session for Unit 0" + selectedId + "?")) {
                appData.revenue += 150; 
                delete appData.active[selectedId];
                render(); await push();
            }
        }

        function tick() {
            for (let iIn in appData.active) {
                const diff = appData.active[iIn].end - Date.now();
                const el = document.getElementById(`t-${iIn}`);
                if (!el) continue;
                if (diff <= 0) {
                    el.innerText = "00:00";
                    el.style.color = "var(--danger)";
                } else {
                    const m = Math.floor(diff / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    el.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    el.style.color = "var(--text)";
                }
            }
        }

        function closeModal() { 
            document.getElementById('modal').style.display = 'none'; 
            document.getElementById('mName').value = "";
        }
    </script>
</body>
</html>
