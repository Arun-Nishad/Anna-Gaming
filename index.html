<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Gaming Cloud Pro v4.1</title>
    <style>
        :root { --bg: #050505; --card-bg: #0a0a0c; --accent: #00f2ff; --danger: #ff3344; --success: #00ff88; --text: #e0e0e0; --border: #1a1a1f; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .sync-status { font-size: 0.7rem; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 16px; background: var(--card-bg); cursor: pointer; transition: 0.3s; position: relative; }
        .card.active { border-color: var(--accent); background: #0d0d10; }
        .card.alarm-active { animation: flash-red 0.8s infinite; border-color: var(--danger); }
        @keyframes flash-red { 0%, 100% { background: var(--card-bg); } 50% { background: #1a0505; } }
        .timer { font-size: 3rem; font-weight: 900; margin: 10px 0; text-align: center; font-family: monospace; }
        .cust-name-tag { color: var(--accent); font-weight: bold; text-align: center; display: block; font-size: 0.85rem; text-transform: uppercase; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 10px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 600px; border-radius: 20px; border: 1px solid #333; padding: 25px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
        .modal-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 12px; transition: 0.2s; }
        .btn-prime { background: var(--accent); color: #000; width: 100%; text-transform: uppercase; }
        .btn-danger { background: var(--danger); color: #fff; width: 100%; text-transform: uppercase; }
        .btn-opt { background: #1a1a1f; color: var(--accent); border: 1px solid #333; flex: 1; font-size: 0.8rem; }
        .total-counter { background: rgba(0, 255, 136, 0.05); color: var(--success); padding: 8px 15px; border-radius: 8px; border: 1px solid rgba(0, 255, 136, 0.2); font-weight: bold; }
        .btn-history { background: #111; color: var(--accent); border: 1px solid #222; font-size: 0.7rem; padding: 5px 10px; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #1a1a1f; }
        th { color: #555; text-transform: uppercase; font-size: 0.7rem; }
        .monthly-summary { background: #1a1a1f; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body onload="init()">

    <div class="header">
        <div>
            <h1 style="margin:0; font-size:1.3rem; color:var(--accent);">ANNA GAMING PRO</h1>
            <div id="syncStatus" class="sync-status">● CONNECTING...</div>
        </div>
        <div style="text-align:right">
            <button class="btn-history" onclick="fetchMonthlyHistory()">📜 MONTHLY HISTORY</button>
            <div class="total-counter">₹<span id="dailyRevenue">0</span></div>
        </div>
    </div>

    <div class="grid" id="gameGrid"></div>

    <div style="background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
        <h3 style="margin-top:0; font-size:1rem;">📊 TODAY'S SESSIONS</h3>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>Unit</th><th>Customer</th><th>Amount</th></tr></thead>
                <tbody id="todayLog"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="color:var(--accent); margin:0;">MONTHLY RECORDS</h2>
                <button onclick="exportMonthlyCSV()" style="background:var(--success); color:#000; padding:5px 10px; font-size:0.7rem;">📥 EXPORT CSV</button>
            </div>
            
            <div class="monthly-summary">
                <div style="font-size:0.7rem; color:#888;">TOTAL MONTHLY REVENUE</div>
                <div style="font-size:1.5rem; color:var(--success); font-weight:900;">₹<span id="monthTotal">0</span></div>
            </div>

            <div id="historyBody" style="overflow-y:auto; max-height:50vh;"></div>
            <button onclick="closeModals()" style="background:none; color:#555; width:100%; margin-top:15px;">CLOSE</button>
        </div>
    </div>

    <div class="modal-overlay" id="startModal">
        <div class="modal-content">
            <h2 style="color:var(--accent); margin-top:0;">START UNIT</h2>
            <input type="text" id="custName" class="modal-input" placeholder="Customer Name">
            <div style="display:flex; gap:10px;">
                <div><small>Minutes</small><input type="number" id="startMins" class="modal-input" value="60"></div>
                <div><small>Price ₹</small><input type="number" id="startRate" class="modal-input" value="150"></div>
            </div>
            <button class="btn-prime" onclick="confirmStart()">LAUNCH SESSION</button>
            <button onclick="closeModals()" style="background:none; color:#555; width:100%; margin-top:10px;">CANCEL</button>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <h2 id="detName" style="color:var(--accent); margin-top:0;">UNIT</h2>
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <button class="btn-opt" onclick="modifyTime(30)">+30 MIN</button>
                <button class="btn-opt" onclick="modifyTime(-30)">-30 MIN</button>
                <button class="btn-opt" onclick="editPrice()">EDIT ₹</button>
            </div>
            <div style="display:flex; justify-content:space-between; padding:12px; background:#000; border-radius:8px; margin-bottom:15px;">
                <span>Total Bill:</span><span id="detRate" style="color:var(--success); font-weight:bold;">₹0</span>
            </div>
            <button class="btn-danger" onclick="confirmCheckout()">CHECKOUT & SAVE</button>
            <button onclick="deleteSession()" style="background:none; color:#ff3344; width:100%; margin-top:10px; font-size:0.7rem;">DELETE (ERROR)</button>
            <button onclick="closeModals()" style="background:none; color:#555; width:100%; margin-top:5px;">CLOSE</button>
        </div>
    </div>

    <script>
        // REPLACE THIS URL WITH YOUR GOOGLE WEB APP URL
        const SYNC_URL = "https://script.google.com/macros/s/AKfycbxm_8MOZPYS_fKcadjPElr0nw9oq6w2J4lumYcIWF8GKyF6GxWUmqBUXXGXq5-K1mVP9g/exec";
        
        const today = new Date();
        const currentDayKey = today.toLocaleDateString('en-CA');
        const currentMonthPrefix = currentDayKey.substring(0, 7); 
        const alarmSound = new Audio('https://actions.google.com/sounds/v1/alarms/spaceship_alarm.ogg');
        
        let appData = { activeSessions: {}, revenue: 0, history: [] };
        let fullMonthData = [];
        let activeUnitId = null;

        async function init() {
            await pull();
            setInterval(updateTickers, 1000);
            setInterval(pull, 10000);
        }

        async function pull() {
            try {
                const res = await fetch(`${SYNC_URL}?key=anna_pro_${currentDayKey}`);
                const data = await res.json();
                if (data.activeSessions) {
                    appData = data;
                    renderGrid();
                    renderTodayLog();
                }
                document.getElementById('syncStatus').innerText = "● ONLINE";
                document.getElementById('syncStatus').style.color = "var(--success)";
            } catch (e) {
                document.getElementById('syncStatus').innerText = "● OFFLINE";
                document.getElementById('syncStatus').style.color = "var(--danger)";
            }
        }

        async function fetchMonthlyHistory() {
            const status = document.getElementById('syncStatus');
            status.innerText = "● FETCHING MONTH...";
            fullMonthData = [];
            let total = 0;

            try {
                const res = await fetch(`${SYNC_URL}?prefix=anna_pro_${currentMonthPrefix}`);
                const allDays = await res.json(); 
                let html = "<table><thead><tr><th>Date</th><th>Customer</th><th>Amount</th></tr></thead><tbody>";
                
                allDays.forEach(day => {
                    const dateLabel = day.key.replace('anna_pro_', '');
                    const dailyData = (typeof day.data === 'string') ? JSON.parse(day.data) : day.data;
                    if (dailyData.history) {
                        dailyData.history.forEach(entry => {
                            total += entry.total;
                            html += `<tr><td>${dateLabel}</td><td>${entry.name}</td><td>₹${entry.total}</td></tr>`;
                            fullMonthData.push({date: dateLabel, ...entry});
                        });
                    }
                });
                
                html += "</tbody></table>";
                if (fullMonthData.length === 0) html = "<p style='text-align:center; padding:20px;'>No records found.</p>";
                document.getElementById('historyBody').innerHTML = html;
                document.getElementById('monthTotal').innerText = total;
                document.getElementById('historyModal').style.display = 'flex';
                status.innerText = "● ONLINE";
            } catch (e) {
                alert("Monthly fetch error. Ensure your Script is deployed as 'Anyone'.");
                status.innerText = "● SYNC ERROR";
            }
        }

        function exportMonthlyCSV() {
            let csv = "Date,Unit,Customer,Amount\n";
            fullMonthData.forEach(e => { csv += `${e.date},${e.unit},${e.name},${e.total}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `AnnaGaming_Monthly_${currentMonthPrefix}.csv`; a.click();
        }

        async function push() {
            const content = encodeURIComponent(JSON.stringify(appData));
            await fetch(`${SYNC_URL}?key=anna_pro_${currentDayKey}&content=${content}`);
        }

        function renderGrid() {
            const container = document.getElementById('gameGrid');
            container.innerHTML = "";
            for (let id = 1; id <= 6; id++) {
                const s = appData.activeSessions[id];
                container.innerHTML += `<div class="card ${s ? 'active' : ''}" id="card-${id}" onclick="handleUnitClick(${id})"><div style="font-size:0.7rem; color:#555;">UNIT 0${id}</div><div class="timer" id="display-${id}">00:00</div><span class="cust-name-tag">${s ? s.name : 'AVAILABLE'}</span></div>`;
            }
            document.getElementById('dailyRevenue').innerText = appData.revenue;
        }

        function renderTodayLog() {
            const log = document.getElementById('todayLog');
            log.innerHTML = appData.history.slice(0, 10).map(e => `<tr><td>${e.unit}</td><td>${e.name}</td><td style="color:var(--success)">₹${e.total}</td></tr>`).join('') || '<tr><td colspan="3" style="text-align:center;">No sessions</td></tr>';
        }

        function handleUnitClick(id) {
            activeUnitId = id;
            if (appData.activeSessions[id]) {
                const s = appData.activeSessions[id];
                document.getElementById('detName').innerText = "UNIT 0" + id + " - " + s.name;
                document.getElementById('detRate').innerText = "₹" + s.rate;
                document.getElementById('detailModal').style.display = 'flex';
            } else {
                document.getElementById('startModal').style.display = 'flex';
            }
        }

        function confirmStart() {
            const name = document.getElementById('custName').value.trim();
            const mins = parseInt(document.getElementById('startMins').value);
            const rate = parseInt(document.getElementById('startRate').value);
            if (!name || isNaN(mins)) return;
            appData.activeSessions[activeUnitId] = { name, startTime: Date.now(), endTime: Date.now() + (mins * 60000), totalDuration: mins * 60000, rate: rate, hourlyRate: rate / (mins / 60) };
            closeModals(); renderGrid(); push();
        }

        function modifyTime(mins) {
            const s = appData.activeSessions[activeUnitId];
            const currentMins = s.totalDuration / 60000;
            const newMins = currentMins + mins; if(newMins < 10) return;
            s.totalDuration = newMins * 60000; s.endTime = s.startTime + s.totalDuration;
            s.rate = Math.round((s.hourlyRate / 60) * newMins);
            document.getElementById('detRate').innerText = "₹" + s.rate; renderGrid(); push();
        }

        function editPrice() {
            const s = appData.activeSessions[activeUnitId];
            const newPrice = prompt("New price:", s.rate);
            if (newPrice !== null && !isNaN(newPrice)) { s.rate = parseInt(newPrice); s.hourlyRate = s.rate / ((s.totalDuration / 60000) / 60); document.getElementById('detRate').innerText = "₹" + s.rate; push(); }
        }

        function confirmCheckout() {
            const s = appData.activeSessions[activeUnitId];
            if(confirm("Collect ₹" + s.rate + "?")) {
                appData.history.unshift({ unit: "U0" + activeUnitId, name: s.name, total: s.rate });
                appData.revenue += s.rate; delete appData.activeSessions[activeUnitId];
                renderGrid(); renderTodayLog(); push(); closeModals();
            }
        }

        function deleteSession() { if(confirm("Delete session?")) { delete appData.activeSessions[activeUnitId]; renderGrid(); push(); closeModals(); } }

        function updateTickers() {
            let alarm = false;
            for (let id in appData.activeSessions) {
                const s = appData.activeSessions[id];
                const diff = s.endTime - Date.now();
                const display = document.getElementById(`display-${id}`);
                const card = document.getElementById(`card-${id}`);
                if (diff <= 0) { display.innerText = "00:00"; card.classList.add('alarm-active'); alarm = true; } 
                else { const m = Math.floor(diff / 60000); const sec = Math.floor((diff % 60000) / 1000); display.innerText = `${m}:${sec < 10 ? '0' : ''}${sec}`; card.classList.remove('alarm-active'); }
            }
            if(alarm) alarmSound.play().catch(()=>{}); else { alarmSound.pause(); alarmSound.currentTime = 0; }
        }

        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }
    </script>
</body>
</html>
