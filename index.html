<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Gaming - Cloud Sync v3.0</title>
    <style>
        :root {
            --bg: #050505; 
            --card-bg: #0a0a0c;
            --accent: #00f2ff;
            --danger: #ff3344;
            --success: #00ff88;
            --text: #e0e0e0;
            --border: #1a1a1f;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; background: var(--card-bg); border-radius: 15px;
            border: 1px solid var(--border); margin-bottom: 20px;
        }
        .main-logo { margin: 0; font-weight: 900; font-size: 1.8rem; color: #00f2ff; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .card { 
            border: 1px solid var(--border); padding: 20px; border-radius: 16px; 
            background: var(--card-bg); cursor: pointer; transition: 0.3s; position: relative;
        }
        .card.active { border-color: var(--accent); background: #0d0d10; }
        .card.alarm-active { animation: flash-red 0.8s infinite; border-color: var(--danger); }

        @keyframes flash-red {
            0%, 100% { background: var(--card-bg); }
            50% { background: #1a0505; }
        }

        .progress-container { width: 100%; height: 6px; background: #111; margin-top: 12px; border-radius: 3px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.5s linear; }

        .timer { font-size: 3.5rem; font-weight: 900; margin: 15px 0; text-align: center; font-family: monospace; }
        .cust-name-tag { color: var(--accent); font-weight: bold; text-align: center; display: block; margin-top: -10px; font-size: 0.9rem; text-transform: uppercase; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 600px; max-height: 85vh;
            border-radius: 20px; border: 1px solid #333; padding: 30px; position: relative; overflow-y: auto;
        }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: #666; font-size: 0.8rem; margin-bottom: 5px; text-transform: uppercase; }
        .modal-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1a1a1f; }
        
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-prime { background: var(--accent); color: #000; width: 100%; height: 50px; font-size: 1rem; text-transform: uppercase; margin-top: 20px; }
        .btn-danger { background: var(--danger); color: #fff; width: 100%; height: 50px; text-transform: uppercase; margin-top: 10px; }
        .btn-delete { background: #1a1a1f; color: #666; width: 100%; height: 40px; text-transform: uppercase; margin-top: 30px; font-size: 0.75rem; border: 1px solid #222; }

        .btn-qty { background: #222; color: white; width: 35px; height: 35px; border: 1px solid #333; }
        .btn-close { position: absolute; top: 20px; right: 20px; background: none; color: #555; font-size: 1.5rem; }

        .btn-outline-accent { background: none; border: 1px solid var(--accent); color: var(--accent); height: 50px; flex: 1; text-transform: uppercase; }
        
        .sync-status { font-size: 0.7rem; color: #555; margin-left: 10px; }
        .total-counter { background: rgba(0, 255, 136, 0.05); color: var(--success); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(0, 255, 136, 0.2); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid #151515; font-size: 0.9rem; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <h1 class="main-logo">ANNA GAMING <span id="syncIndicator" class="sync-status">● CONNECTING...</span></h1>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="total-counter" style="background:#111; color:var(--accent); cursor:pointer;" onclick="openArchiveModal()">📅 HISTORY</button>
            <span class="total-counter">REVENUE: ₹<span id="dailyRevenue">0</span></span>
        </div>
    </div>

    <div class="grid" id="gameGrid"></div>

    <div class="modal-overlay" id="startModal">
        <div class="modal-content">
            <button class="btn-close" onclick="closeModals()">&times;</button>
            <h2 id="startModalTitle" style="margin-top:0; color:var(--accent);">START UNIT</h2>
            <div class="input-group">
                <label>Customer Name *</label>
                <input type="text" id="custName" class="modal-input" placeholder="Enter name">
            </div>
            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex:1">
                    <label>Minutes</label>
                    <input type="number" id="startMins" class="modal-input" value="60">
                </div>
                <div class="input-group" style="flex:1">
                    <label>Price (₹)</label>
                    <input type="number" id="startRate" class="modal-input" value="150">
                </div>
            </div>
            <button class="btn-prime" onclick="confirmStart()">Launch Session</button>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <button class="btn-close" onclick="closeModals()">&times;</button>
            <h2 id="detailTitle" style="margin-top:0; color:var(--accent);">UNIT DETAILS</h2>
            <div id="custInfoBox" style="margin-bottom:20px; padding:15px; background:rgba(255,255,255,0.03); border-radius:10px;">
                <div style="font-weight:bold; font-size:1.2rem;" id="detName">Customer Name</div>
                <div style="color:var(--success); font-size:1.1rem; margin-top:5px;">Gaming Rate: ₹<span id="detRate">0</span></div>
            </div>
            <div class="detail-row">
                <span>Coke (₹40)</span>
                <div>
                    <button class="btn-qty" onclick="changeQty('coke', -1)">-</button>
                    <span id="detCoke" style="margin: 0 15px; font-weight:bold;">0</span>
                    <button class="btn-qty" onclick="changeQty('coke', 1)">+</button>
                </div>
            </div>
            <div class="detail-row">
                <span>Chips (₹20)</span>
                <div>
                    <button class="btn-qty" onclick="changeQty('chips', -1)">-</button>
                    <span id="detChips" style="margin: 0 15px; font-weight:bold;">0</span>
                    <button class="btn-qty" onclick="changeQty('chips', 1)">+</button>
                </div>
            </div>
            <button class="btn-danger" onclick="confirmCheckout()" style="margin-top:10px;">Checkout & Save</button>
            <button class="btn-delete" onclick="emergencyDelete()">Delete Session</button>
        </div>
    </div>

    <script>
        const SYNC_URL = "https://script.google.com/macros/s/AKfycby11dJTPYteZceZYEuldpmbdY0OQyPU92XKzU50FP7kjb7YBiOzsqnG_3kPmFwDYRQtgA/exec";
        const screens = [1, 2, 3, 4, 5, 6];
        const snackPrice = { coke: 40, chips: 20 };
        let activeUnitId = null;
        let currentDayKey = new Date().toLocaleDateString('en-CA');
        let appData = { history: [], revenue: 0, activeSessions: {} };

        async function initApp() {
            await pullFromCloud();
            renderGrid();
            updateDailyRevenueDisplay();
            setInterval(updateTickers, 1000);
            setInterval(pullFromCloud, 5000); // Sync every 5 seconds
        }

        async function pullFromCloud() {
            try {
                const response = await fetch(`${SYNC_URL}?key=gz_data_${currentDayKey}`);
                const data = await response.json();
                if (data.history) {
                    appData = data;
                    renderGrid();
                    updateDailyRevenueDisplay();
                    document.getElementById('syncIndicator').innerText = "● ONLINE";
                    document.getElementById('syncIndicator').style.color = "var(--success)";
                }
            } catch (e) {
                document.getElementById('syncIndicator').innerText = "● OFFLINE";
                document.getElementById('syncIndicator').style.color = "var(--danger)";
            }
        }

        async function pushToCloud() {
            document.getElementById('syncIndicator').innerText = "● SYNCING...";
            await fetch(SYNC_URL, {
                method: "POST",
                body: JSON.stringify({ key: `gz_data_${currentDayKey}`, content: JSON.stringify(appData) })
            });
            document.getElementById('syncIndicator').innerText = "● ONLINE";
        }

        function renderGrid() {
            const container = document.getElementById('gameGrid');
            container.innerHTML = screens.map(id => {
                const session = appData.activeSessions[id];
                const isActive = !!session;
                return `
                <div class="card ${isActive ? 'active' : ''}" id="card-${id}" onclick="handleUnitClick(${id})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:bold; color:#555;">UNIT 0${id}</span>
                        <span style="color:${isActive ? 'var(--success)' : '#333'}; font-size:0.7rem; font-weight:bold;">● ${isActive ? 'BUSY' : 'IDLE'}</span>
                    </div>
                    <div class="progress-container"><div class="progress-bar" id="bar-${id}"></div></div>
                    <div class="timer" id="display-${id}">00:00</div>
                    ${isActive ? `<span class="cust-name-tag">${session.name}</span>` : '<span style="display:block; text-align:center; color:#222; font-size:0.8rem;">AVAILABLE</span>'}
                </div>`;
            }).join('');
        }

        function handleUnitClick(id) {
            activeUnitId = id;
            if (appData.activeSessions[id]) openDetailModal(id, appData.activeSessions[id]);
            else openStartModal(id);
        }

        function openStartModal(id) {
            document.getElementById('startModalTitle').innerText = `START UNIT 0${id}`;
            document.getElementById('startModal').style.display = 'flex';
        }

        async function confirmStart() {
            const name = document.getElementById('custName').value.trim();
            const mins = parseInt(document.getElementById('startMins').value);
            const rate = parseInt(document.getElementById('startRate').value);
            if (!name) return alert("Name required");
            const now = Date.now();
            appData.activeSessions[activeUnitId] = { 
                name, startTime: now, endTime: now + (mins * 60000), 
                totalDuration: mins * 60000, rate, coke: 0, chips: 0 
            };
            closeModals(); renderGrid(); await pushToCloud();
        }

        function openDetailModal(id, session) {
            document.getElementById('detName').innerText = session.name;
            document.getElementById('detRate').innerText = session.rate;
            document.getElementById('detCoke').innerText = session.coke;
            document.getElementById('detChips').innerText = session.chips;
            document.getElementById('detailModal').style.display = 'flex';
        }

        async function changeQty(item, delta) {
            const session = appData.activeSessions[activeUnitId];
            session[item] = Math.max(0, session[item] + delta);
            document.getElementById(`det${item.charAt(0).toUpperCase() + item.slice(1)}`).innerText = session[item];
            await pushToCloud();
        }

        async function confirmCheckout() {
            const session = appData.activeSessions[activeUnitId];
            const foodTotal = (session.coke * snackPrice.coke) + (session.chips * snackPrice.chips);
            const total = session.rate + foodTotal;
            appData.history.unshift({ unit: `Unit 0${activeUnitId}`, name: session.name, total });
            appData.revenue += total;
            delete appData.activeSessions[activeUnitId];
            closeModals(); renderGrid(); updateDailyRevenueDisplay(); await pushToCloud();
        }

        async function emergencyDelete() {
            if (confirm("Delete session?")) {
                delete appData.activeSessions[activeUnitId];
                closeModals(); renderGrid(); await pushToCloud();
            }
        }

        function updateTickers() {
            screens.forEach(id => {
                const session = appData.activeSessions[id];
                const display = document.getElementById(`display-${id}`);
                const bar = document.getElementById(`bar-${id}`);
                const card = document.getElementById(`card-${id}`);
                if (!session) return;
                const diff = session.endTime - Date.now();
                if (diff <= 0) { display.innerText = "00:00"; bar.style.width = "100%"; card.classList.add('alarm-active'); }
                else {
                    const m = Math.floor(diff / 60000); const s = Math.floor((diff % 60000) / 1000);
                    display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    bar.style.width = Math.min(100, ((Date.now() - session.startTime) / session.totalDuration) * 100) + "%";
                }
            });
        }

        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
        function updateDailyRevenueDisplay() { document.getElementById('dailyRevenue').innerText = appData.revenue; }
    </script>
</body>
</html>
