<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Gaming Pro v4.5</title>
    <style>
        :root { --bg: #050505; --card-bg: #0a0a0c; --accent: #00f2ff; --danger: #ff3344; --success: #00ff88; --text: #e0e0e0; --border: #1a1a1f; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .grid-units { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .dashboard-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) { .dashboard-row { grid-template-columns: 1fr; } }
        .card { border: 1px solid var(--border); padding: 20px; border-radius: 16px; background: var(--card-bg); cursor: pointer; transition: 0.3s; text-align: center; }
        .card.active { border-color: var(--accent); background: #0d0d10; }
        .card.alarm-active { animation: flash-red 0.8s infinite; border-color: var(--danger); }
        @keyframes flash-red { 0%, 100% { background: var(--card-bg); } 50% { background: #1a0505; } }
        .timer { font-size: 2.5rem; font-weight: 900; margin: 10px 0; font-family: monospace; color: #fff; }
        .cust-name-tag { color: var(--accent); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; height: 1.2rem; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 450px; border-radius: 20px; border: 1px solid #333; padding: 25px; }
        .modal-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 12px; transition: 0.2s; }
        .btn-prime { background: var(--accent); color: #000; width: 100%; }
        .btn-opt { background: #1a1a1f; color: var(--accent); border: 1px solid #333; margin: 2px; font-size: 0.7rem; }
        .total-counter { background: rgba(0, 255, 136, 0.1); color: var(--success); padding: 8px 15px; border-radius: 8px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 8px; border-bottom: 1px solid #1a1a1f; text-align: left; }
        .snack-item { display: flex; justify-content: space-between; padding: 10px; background: #000; margin-bottom: 5px; border-radius: 8px; border: 1px solid #222; }
    </style>
</head>
<body onload="init()">

    <div class="header">
        <div>
            <h1 style="margin:0; font-size:1.2rem; color:var(--accent);">ANNA GAMING PRO</h1>
            <div id="syncStatus" style="font-size:0.7rem;">● STARTING...</div>
        </div>
        <div style="text-align:right">
            <div class="total-counter">Total ₹<span id="dailyRevenue">0</span></div>
        </div>
    </div>

    <div class="grid-units" id="gameGrid"></div>

    <div class="dashboard-row">
        <div style="background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
            <h3 style="margin:0 0 10px 0; font-size:0.8rem; color:var(--accent);">📊 RECENT SESSIONS</h3>
            <table><tbody id="todayLog"></tbody></table>
        </div>
        <div style="background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0; font-size:0.8rem; color:var(--success);">🍿 SNACK STOCK</h3>
                <button onclick="addSnackType()" style="padding:4px 8px; font-size:0.6rem; background:var(--accent); color:#000;">+ ADD NEW</button>
            </div>
            <div id="snackInventoryList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="startModal">
        <div class="modal-content">
            <h2 style="color:var(--accent); margin:0 0 15px 0;">START UNIT</h2>
            <input type="text" id="custName" class="modal-input" placeholder="Customer Name">
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><small>Mins</small><input type="number" id="startMins" class="modal-input" value="60"></div>
                <div style="flex:1"><small>Rate ₹</small><input type="number" id="startRate" class="modal-input" value="150"></div>
            </div>
            <button class="btn-prime" onclick="confirmStart()">START SESSION</button>
            <button onclick="closeModals()" style="background:none; color:#555; width:100%; margin-top:10px;">CANCEL</button>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <h2 id="detName" style="color:var(--accent); margin:0 0 15px 0;">UNIT</h2>
            <small style="color:#666;">ADD SNACKS:</small>
            <div style="display:flex; flex-wrap:wrap; gap:5px; margin:10px 0 20px 0;" id="snackSelectArea"></div>
            <div style="background:#000; padding:15px; border-radius:10px; margin-bottom:15px; border:1px solid #222;">
                <div style="display:flex; justify-content:space-between;"><span>Game:</span><span id="detRate">₹0</span></div>
                <div style="display:flex; justify-content:space-between;"><span>Snacks:</span><span id="detSnacks" style="color:var(--accent)">₹0</span></div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem; border-top:1px solid #333; margin-top:10px; padding-top:10px; color:var(--success);">
                    <span>TOTAL:</span><span id="detGrandTotal">₹0</span>
                </div>
            </div>
            <button class="btn-prime" style="background:var(--danger); color:#fff;" onclick="confirmCheckout()">CHECKOUT</button>
            <button onclick="closeModals()" style="background:none; color:#555; width:100%; margin-top:10px;">CLOSE</button>
        </div>
    </div>

    <script>
        const SYNC_URL = "https://script.google.com/macros/s/AKfycbz9uCjqpaCDbCCnTxcKu_P6QDO_RaWLX3uOtHcj2-zFMgXR0Bk7ICrm9RkrcBrP6FcGbA/exec";
        const currentDayKey = new Date().toLocaleDateString('en-CA');
        const alarmSound = new Audio('https://actions.google.com/sounds/v1/alarms/spaceship_alarm.ogg');
        
        let appData = { activeSessions: {}, revenue: 0, history: [], snacks: [] };
        let activeUnitId = null;

        function init() {
            renderGrid(); // Draw empty units immediately
            pull();
            setInterval(updateTickers, 1000);
            setInterval(pull, 15000);
        }

        async function pull() {
            try {
                const res = await fetch(`${SYNC_URL}?key=anna_pro_${currentDayKey}`);
                const data = await res.json();
                
                // If data exists, use it. If not, we keep the empty appData structure.
                if (data && data.activeSessions) {
                    appData = data;
                } else {
                    // First time for today? Push blank data to clear Sheets
                    push();
                }
                
                renderGrid();
                renderTodayLog();
                renderSnackInventory();
                document.getElementById('syncStatus').innerText = "● ONLINE";
                document.getElementById('syncStatus').style.color = "var(--success)";
            } catch (e) {
                document.getElementById('syncStatus').innerText = "● CONNECTED (NEW DAY)";
                document.getElementById('syncStatus').style.color = "var(--accent)";
            }
        }

        function renderGrid() {
            const container = document.getElementById('gameGrid');
            let html = "";
            for (let id = 1; id <= 6; id++) {
                const s = appData.activeSessions[id];
                html += `
                    <div class="card ${s ? 'active' : ''}" id="card-${id}" onclick="handleUnitClick(${id})">
                        <div style="font-size:0.7rem; color:#555; margin-bottom:5px;">UNIT 0${id}</div>
                        <div class="cust-name-tag">${s ? s.name : 'AVAILABLE'}</div>
                        <div class="timer" id="display-${id}">00:00</div>
                    </div>`;
            }
            container.innerHTML = html;
            document.getElementById('dailyRevenue').innerText = appData.revenue;
        }

        function handleUnitClick(id) {
            activeUnitId = id;
            if (appData.activeSessions[id]) {
                updateDetailDisplay();
                renderSnackButtons();
                document.getElementById('detailModal').style.display = 'flex';
            } else {
                document.getElementById('startModal').style.display = 'flex';
            }
        }

        function confirmStart() {
            const name = document.getElementById('custName').value.trim();
            const mins = parseInt(document.getElementById('startMins').value);
            const rate = parseInt(document.getElementById('startRate').value);
            if (!name) return;
            appData.activeSessions[activeUnitId] = { 
                name, startTime: Date.now(), endTime: Date.now() + (mins * 60000), 
                totalDuration: mins * 60000, rate, hourlyRate: rate/(mins/60), snackBill: 0 
            };
            document.getElementById('custName').value = "";
            closeModals(); renderGrid(); push();
        }

        async function push() {
            const content = encodeURIComponent(JSON.stringify(appData));
            await fetch(`${SYNC_URL}?key=anna_pro_${currentDayKey}&content=${content}`);
        }

        function updateTickers() {
            let alarm = false;
            for (let id in appData.activeSessions) {
                const s = appData.activeSessions[id];
                const diff = s.endTime - Date.now();
                const display = document.getElementById(`display-${id}`);
                const card = document.getElementById(`card-${id}`);
                if (!display) continue;
                if (diff <= 0) { display.innerText = "00:00"; card.classList.add('alarm-active'); alarm = true; } 
                else {
                    const m = Math.floor(diff / 60000);
                    const sec = Math.floor((diff % 60000) / 1000);
                    display.innerText = `${m}:${sec < 10 ? '0' : ''}${sec}`;
                    card.classList.remove('alarm-active');
                }
            }
            if(alarm) alarmSound.play().catch(()=>{}); else { alarmSound.pause(); alarmSound.currentTime = 0; }
        }

        function renderSnackInventory() {
            document.getElementById('snackInventoryList').innerHTML = appData.snacks.map((s, idx) => `
                <div class="snack-item">
                    <span>${s.name} (₹${s.price})</span>
                    <span>Stock: <b>${s.stock}</b> <button onclick="updateStock(${idx}, 1)" style="padding:2px 5px; margin-left:5px;">+</button></span>
                </div>
            `).join('') || '<div style="text-align:center; padding:10px; color:#444;">No snacks added.</div>';
        }

        function renderSnackButtons() {
            document.getElementById('snackSelectArea').innerHTML = appData.snacks.map((s, idx) => `
                <button class="btn-opt" onclick="addSnackToUnit(${idx})">+ ${s.name}</button>
            `).join('');
        }

        function addSnackToUnit(idx) {
            const snack = appData.snacks[idx];
            if (snack.stock <= 0) return alert("Out of Stock!");
            appData.activeSessions[activeUnitId].snackBill = (appData.activeSessions[activeUnitId].snackBill || 0) + snack.price;
            snack.stock--;
            updateDetailDisplay(); renderSnackInventory(); push();
        }

        function updateDetailDisplay() {
            const s = appData.activeSessions[activeUnitId];
            document.getElementById('detName').innerText = "UNIT 0" + activeUnitId + " - " + s.name;
            document.getElementById('detRate').innerText = "₹" + s.rate;
            document.getElementById('detSnacks').innerText = "₹" + (s.snackBill || 0);
            document.getElementById('detGrandTotal').innerText = "₹" + (s.rate + (s.snackBill || 0));
        }

        function confirmCheckout() {
            const s = appData.activeSessions[activeUnitId];
            const total = s.rate + (s.snackBill || 0);
            if(confirm(`Checkout ₹${total}?`)) {
                appData.history.unshift({ unit: "U0"+activeUnitId, name: s.name, total });
                appData.revenue += total;
                delete appData.activeSessions[activeUnitId];
                renderGrid(); renderTodayLog(); push(); closeModals();
            }
        }

        function addSnackType() {
            const name = prompt("Snack Name:");
            const price = parseInt(prompt("Price:"));
            if(name && price) { appData.snacks.push({name, price, stock:10}); renderSnackInventory(); push(); }
        }
        function updateStock(idx, val) { appData.snacks[idx].stock += val; renderSnackInventory(); push(); }
        function renderTodayLog() {
            document.getElementById('todayLog').innerHTML = appData.history.slice(0,5).map(h => `<tr><td>${h.unit}</td><td>${h.name}</td><td>₹${h.total}</td></tr>`).join('');
        }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }
    </script>
</body>
</html>
