<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Gaming Admin - Cloud Sync</title>
    <style>
        :root { --bg: #050505; --card-bg: #0a0a0c; --accent: #00f2ff; --danger: #ff3344; --success: #00ff88; --text: #e0e0e0; --border: #1a1a1f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .sync-status { font-size: 0.75rem; font-weight: bold; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { border: 1px solid var(--border); padding: 15px; border-radius: 12px; background: var(--card-bg); text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .card.active { border-color: var(--accent); background: #0d0d10; }
        .timer { font-size: 2.2rem; font-weight: 900; margin: 10px 0; font-family: monospace; }
        .cust-name { color: var(--accent); font-size: 0.85rem; font-weight: bold; display: block; min-height: 1.2em; text-transform: uppercase; }
        .btn-test { background: #1a1a1f; color: #666; border: 1px solid #333; padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; cursor: pointer; margin-top: 8px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; border-radius: 8px; }
    </style>
</head>
<body onload="init()">

    <div class="header">
        <div>
            <h1 style="margin:0; font-size:1.4rem; color:var(--accent);">ANNA GAMING</h1>
            <div id="syncStatus" class="sync-status">● CONNECTING...</div>
            <button class="btn-test" onclick="testConnection()">RE-TEST SYNC</button>
        </div>
        <div style="text-align:right">
            <div style="font-size:0.6rem; color:#666;">DAILY REVENUE</div>
            <div style="font-weight:bold; color:var(--success); font-size:1.2rem;">₹<span id="rev">0</span></div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 style="margin:0; color:var(--accent); font-size:1.2rem;">START UNIT</h2>
            <input type="text" id="mName" placeholder="Customer Name">
            <input type="number" id="mMins" value="60">
            <button onclick="startSession()" style="background:var(--accent); color:#000; width:100%; padding:12px; border:none; font-weight:bold; border-radius:8px; cursor:pointer;">START SESSION</button>
            <button onclick="closeModal()" style="background:none; color:#555; border:none; width:100%; margin-top:15px; cursor:pointer;">CANCEL</button>
        </div>
    </div>

    <script>
        const SYNC_URL = "https://script.google.com/macros/s/AKfycbxknh20tM8Pg-huYELybvGUKDA82ii8f_WYnXS1QZ-9YXkY_CTlC6qvVWfQWliJWAhnKA/exec"; 
        const currentDayKey = new Date().toLocaleDateString('en-CA');
        let appData = { active: {}, revenue: 0 };
        let selectedId = null;

        async function init() {
            await pull();
            render();
            setInterval(tick, 1000);
            setInterval(pull, 6000); 
        }

        async function testConnection() {
            try {
                const res = await fetch(`${SYNC_URL}?key=test`);
                const text = await res.text();
                alert("Cloud Connection Success!");
                pull();
            } catch (e) {
                alert("Connection Error: Check if Google Script is set to 'Anyone'");
            }
        }

        async function pull() {
            try {
                const res = await fetch(`${SYNC_URL}?key=anna_${currentDayKey}`);
                const data = await res.json();
                if (data.active !== undefined) {
                    appData = data;
                    render();
                    document.getElementById('syncStatus').innerText = "● ONLINE (SYNCED)";
                    document.getElementById('syncStatus').style.color = "var(--success)";
                }
            } catch (e) { 
                document.getElementById('syncStatus').innerText = "● OFFLINE (RETRYING)";
                document.getElementById('syncStatus').style.color = "var(--danger)";
            }
        }

        async function push() {
            const content = encodeURIComponent(JSON.stringify(appData));
            await fetch(`${SYNC_URL}?key=anna_${currentDayKey}&content=${content}`);
        }

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = "";
            for (let i = 1; i <= 6; i++) {
                const s = appData.active[i];
                container.innerHTML += `
                    <div class="card ${s ? 'active' : ''}" onclick="handleClick(${i})">
                        <div style="font-size:0.7rem; color:#444;">UNIT 0${i}</div>
                        <div class="timer" id="t-${i}">00:00</div>
                        <span class="cust-name">${s ? s.name : 'OPEN'}</span>
                    </div>`;
            }
            document.getElementById('rev').innerText = appData.revenue;
        }

        function handleClick(id) {
            selectedId = id;
            if (appData.active[id]) {
                if(confirm("End Session for Unit " + id + "?")) {
                    appData.revenue += 150; 
                    delete appData.active[id];
                    render(); push();
                }
            } else { document.getElementById('modal').style.display = 'flex'; }
        }

        async function startSession() {
            const name = document.getElementById('mName').value.trim();
            const mins = document.getElementById('mMins').value;
            if (!name) return;
            appData.active[selectedId] = { name, end: Date.now() + (mins * 60000) };
            closeModal(); render(); await push();
        }

        function tick() {
            for (let i in appData.active) {
                const diff = appData.active[i].end - Date.now();
                const el = document.getElementById(`t-${i}`);
                if (el) {
                    if (diff <= 0) el.innerText = "00:00";
                    else {
                        const m = Math.floor(diff / 60000);
                        const s = Math.floor((diff % 60000) / 1000);
                        el.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    }
                }
            }
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
